name: market-news-collector

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "30 6 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r projects/market_news_automation/requirements.txt
      - name: Collect snapshot
        run: python projects/market_news_automation/collect_news_snapshot.py
      - name: Aggregate daily features
        run: python projects/market_news_automation/aggregate_daily_news.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/market_news_automation/output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update market news snapshots"
          git push origin HEAD:${GITHUB_REF_NAME}
