name: market-news-collector

on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "30 6 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas
      - name: Collect snapshot
        run: python projects/market_news_automation/collect_news_snapshot.py
      - name: Aggregate daily features
        run: python projects/market_news_automation/aggregate_daily_news.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/market_news_automation/output/
          git diff --cached --quiet || git commit -m "Update market news snapshots"
          git push
